services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hanoios
      POSTGRES_PASSWORD: hanoios
      POSTGRES_DB: hanoios_db
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanoios"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://hanoios:hanoios@postgres:5432/hanoios_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  scheduler:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://hanoios:hanoios@postgres:5432/hanoios_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m src.scheduler.main

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
  chromadata:
